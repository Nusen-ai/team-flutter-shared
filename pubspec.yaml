name: flutter_shared_components
description: 企业级多iOS原生项目复用Flutter组件库
version: 1.0.0
publish_to: none
repository: https://github.com/your-org/flutter-shared-components

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  qr_scanner_plugin:
    path: ../flutter_plugins/qr_scanner_plugin
  bluetooth_plugin:
    path: ../flutter_plugins/bluetooth_plugin
  push_plugin:
    path: ../flutter_plugins/push_plugin
  device_info_plugin:
    path: ../flutter_plugins/device_info_plugin

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
