name: flutter_shared_components
description: 企业级多iOS原生项目复用Flutter组件库
version: 1.0.0
publish_to: none
repository: https://github.com/your-org/flutter-shared-components

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  qr_code_scanner: ^1.0.1
  flutter_blue_plus: ^1.31.0
  device_info_plus: ^9.1.0
  firebase_messaging: ^14.6.5
  firebase_core: ^2.23.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
